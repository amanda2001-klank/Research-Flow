<svg viewBox="0 0 200 80" xmlns="http://www.w3.org/2000/svg">
  <!-- Chain Link Logo -->
  <g>
    <!-- First Link -->
    <rect x="20" y="25" width="30" height="30" rx="8" fill="none" stroke="#E8A63A" stroke-width="3"/>
    <rect x="25" y="30" width="20" height="20" rx="5" fill="#E8A63A"/>
    
    <!-- Second Link -->
    <rect x="50" y="25" width="30" height="30" rx="8" fill="none" stroke="#7A9B99" stroke-width="3"/>
    <rect x="55" y="30" width="20" height="20" rx="5" fill="#7A9B99"/>
    
    <!-- Connecting Line -->
    <line x1="50" y1="40" x2="50" y2="40" stroke="#E8A63A" stroke-width="2"/>
  </g>
  
  <!-- Text -->
  <text x="90" y="55" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#2c5f5d">
    Research Flow
  </text>
</svg>